<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Box vs Box</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #c { display: none; width: 100%; height: 100%; }

    /* ── LOADER ─────────────────────────────────────────────── */
    #loader {
      position: fixed; inset: 0; z-index: 999;
      background: #0a0a0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: Arial Black, Arial, sans-serif;
      gap: 0;
      transition: opacity 0.5s ease;
    }
    #loader.fade-out { opacity: 0; pointer-events: none; }

    #loader-title {
      font-size: clamp(28px, 8vw, 52px);
      font-weight: 900;
      color: #fff;
      letter-spacing: -1px;
      margin-bottom: 6px;
      text-shadow: 0 0 40px rgba(130,80,255,0.8);
    }
    #loader-sub {
      font-size: clamp(11px, 3vw, 14px);
      color: #7B68EE;
      font-weight: 700;
      margin-bottom: 48px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #loader-bar-wrap {
      width: min(320px, 80vw);
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    #loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7B68EE, #C39BD3);
      border-radius: 99px;
      transition: width 0.25s ease;
      box-shadow: 0 0 12px rgba(130,80,255,0.6);
    }

    #loader-file {
      font-size: clamp(10px, 2.5vw, 12px);
      color: rgba(255,255,255,0.35);
      font-family: monospace;
      margin-bottom: 4px;
      height: 16px;
    }
    #loader-count {
      font-size: clamp(10px, 2.5vw, 11px);
      color: rgba(255,255,255,0.2);
      font-family: monospace;
    }

    /* ── ERRO ────────────────────────────────────────────────── */
    #error-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 1000;
      background: #0a0a0f;
      align-items: center; justify-content: center;
      flex-direction: column;
      font-family: Arial, sans-serif;
      padding: 24px;
    }
    #error-overlay.show { display: flex; }

    #error-icon {
      font-size: 48px; margin-bottom: 16px;
    }
    #error-title {
      font-size: 20px; font-weight: 900;
      color: #ff4444; margin-bottom: 8px;
      font-family: Arial Black, Arial, sans-serif;
    }
    #error-file {
      font-size: 13px; color: rgba(255,255,255,0.5);
      font-family: monospace; margin-bottom: 20px;
      word-break: break-all; text-align: center;
    }
    #error-box {
      background: rgba(255,40,40,0.08);
      border: 1px solid rgba(255,40,40,0.25);
      border-radius: 12px;
      padding: 16px 20px;
      max-width: 520px; width: 100%;
      font-family: monospace;
      font-size: 12px;
      color: #ff8888;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }
    #error-hint {
      margin-top: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      text-align: center;
      max-width: 400px;
      line-height: 1.5;
    }
    #error-retry {
      margin-top: 20px;
      padding: 12px 28px;
      background: #7B68EE;
      border: none; border-radius: 12px;
      font-size: 14px; font-weight: 900;
      color: white; cursor: pointer;
      font-family: Arial Black, Arial, sans-serif;
    }

    /* ── Editor wizard animations ───────────────────────────── */
    @keyframes _edSlideIn {
      from { opacity: 0; transform: translateX(28px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes _edSlideBack {
      from { opacity: 0; transform: translateX(-28px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes _edFadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }
    #ed-step-content.anim-forward  { animation: _edSlideIn   0.25s cubic-bezier(0.22,1,0.36,1); }
    #ed-step-content.anim-back     { animation: _edSlideBack 0.25s cubic-bezier(0.22,1,0.36,1); }
    #ed-step-content.anim-home     { animation: _edFadeIn    0.28s cubic-bezier(0.22,1,0.36,1); }
    #ed-header-title { transition: opacity 0.18s ease; }
    #ed-header-sub   { transition: opacity 0.18s ease; }
  </style>
</head>
<body>

<!-- ── Tela de loading ──────────────────────────────────────── -->
<div id="loader">
  <div id="loader-title">Box vs Box</div>
  <div id="loader-sub">Guy Battle</div>
  <div id="loader-bar-wrap"><div id="loader-bar"></div></div>
  <div id="loader-file">iniciando...</div>
  <div id="loader-count"></div>
</div>

<!-- ── Tela de erro ─────────────────────────────────────────── -->
<div id="error-overlay">
  <div id="error-icon">💀</div>
  <div id="error-title">Erro ao carregar</div>
  <div id="error-file"></div>
  <div id="error-box"></div>
  <div id="error-hint"></div>
  <button id="error-retry" onclick="location.reload()">Tentar novamente</button>
</div>

<!-- ── Game canvas ─────────────────────────────────────────── -->
<canvas id="c"></canvas>

<!-- ── Globals + loader dinâmico ──────────────────────────── -->
<!-- Socket.io client (multiplayer) -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
"use strict";
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const DPR    = window.devicePixelRatio || 1;

// ── Lista de módulos em ordem obrigatória ──────────────────
const _BASE = 'https://raw.githubusercontent.com/klimplimRBX/SomethingForMyFriend_Extra/main/';
const _MODULES = [
  'audio.js','assets.js','constants.js','utils.js','projectiles.js',
  'char_base.js','char_tiger.js','char_moto.js','char_neymar.js','char_baiano.js',
  'char_receita.js','char_jevil.js','char_dog.js','char_custom.js','char_player.js',
  'persistence.js','hydration.js','char_types.js','game.js','input.js','editor.js',
  'network.js','online.js'  // ← ONLINE PATCH
];
const _TOTAL = _MODULES.length;
let _loaded  = 0;

const _loaderEl  = document.getElementById('loader');
const _barEl     = document.getElementById('loader-bar');
const _fileEl    = document.getElementById('loader-file');
const _countEl   = document.getElementById('loader-count');
const _errOver   = document.getElementById('error-overlay');
const _errFile   = document.getElementById('error-file');
const _errBox    = document.getElementById('error-box');
const _errHint   = document.getElementById('error-hint');

// ── Captura erros de execução JS (ex: syntax error no módulo) ──
window.addEventListener('error', e => {
  // Filtra erros dos módulos (ignora erros internos do loader)
  const src = e.filename || '';
  const isModule = _MODULES.some(m => src.includes(m));
  if (!isModule && src && !src.includes('SomethingForMyFriend_Extra')) return;

  const name = src ? src.split('/').pop() : 'desconhecido';
  _showError(
    src || 'execução',
    `${e.message}\n\nArquivo: ${src}\nLinha: ${e.lineno}  Coluna: ${e.colno}`,
    'Erro de execução — provavelmente um bug no código do módulo ou uma dependência que ainda não estava carregada.'
  );
});

function _updateProgress(filename) {
  _loaded++;
  const pct = (_loaded / _TOTAL) * 100;
  _barEl.style.width = pct + '%';
  _fileEl.textContent = filename;
  _countEl.textContent = `${_loaded} / ${_TOTAL}`;
}

function _showError(url, msg, hint) {
  _loaderEl.style.display = 'none';
  _errFile.textContent = url;
  _errBox.textContent  = msg;
  _errHint.textContent = hint || '';
  _errOver.classList.add('show');
}

function _done() {
  _fileEl.textContent  = 'pronto!';
  _countEl.textContent = `${_TOTAL} / ${_TOTAL}`;
  _barEl.style.width   = '100%';
  canvas.style.display = 'block';
  setTimeout(() => {
    _loaderEl.classList.add('fade-out');
    setTimeout(() => { _loaderEl.style.display = 'none'; }, 520);
  }, 300);
}

// ── Cache offline (localStorage) ──────────────────────────────
const _CK = 'gbcache_'; // prefixo das chaves
function _cacheOk()    { try { return localStorage.getItem(_CK+'ok') === '1'; } catch { return false; } }
function _cacheLoad(f) { try { return localStorage.getItem(_CK+f); }           catch { return null;  } }
function _cacheSave(codes) {
  try {
    for (const [f, c] of Object.entries(codes)) localStorage.setItem(_CK+f, c);
    localStorage.setItem(_CK+'ok', '1');
    return true;
  } catch(e) {
    // Limpa tudo se falhou (ex: cota cheia)
    try { for (const f of _MODULES) localStorage.removeItem(_CK+f); localStorage.removeItem(_CK+'ok'); } catch {}
    return false;
  }
}
function _cacheClear() {
  try { for (const f of _MODULES) localStorage.removeItem(_CK+f); localStorage.removeItem(_CK+'ok'); } catch {}
}

// ── Fetch todos em paralelo → executa em ordem ────────────────
const _fetchedCodes = {}; // guarda código para salvar depois se o usuário quiser

async function _fetchModule(filename) {
  const url = _BASE + filename;

  // Tenta cache primeiro
  if (_cacheOk()) {
    const cached = _cacheLoad(filename);
    if (cached) return { filename, url, blob: new Blob([cached], { type: 'application/javascript' }), fromCache: true };
  }

  let res;
  try {
    res = await fetch(url);
  } catch(e) {
    _showError(url, `Erro de rede: ${e.message}\n\nNão foi possível conectar ao GitHub.\nVerifique sua conexão com a internet.`);
    return null;
  }
  if (!res.ok) {
    const status = `${res.status} ${res.statusText}`;
    let detail = `HTTP ${status}\nURL: ${url}\n`;
    if (res.status === 404) detail += '\nArquivo não encontrado no repositório.';
    else if (res.status === 403) detail += '\nAcesso negado — o repositório pode ser privado.';
    else if (res.status === 429) detail += '\nMuitas requisições — GitHub está limitando o acesso. Tente novamente em alguns segundos.';
    else detail += '\nResposta inesperada do servidor.';
    _showError(url, detail);
    return null;
  }
  const code = await res.text();
  _fetchedCodes[filename] = code; // guarda pra salvar depois
  return { filename, url, blob: new Blob([code], { type: 'application/javascript' }), fromCache: false };
}

function _execModule({ filename, url, blob }) {
  return new Promise((resolve, reject) => {
    const blobURL = URL.createObjectURL(blob);
    const script  = document.createElement('script');
    script.src    = blobURL;
    script.onload = () => {
      URL.revokeObjectURL(blobURL);
      _updateProgress(filename);
      resolve();
    };
    script.onerror = () => {
      URL.revokeObjectURL(blobURL);
      _showError(url, `Erro ao executar "${filename}".\nO arquivo foi baixado mas falhou ao rodar.\nVeja o erro de execução capturado acima ou abra o console para mais detalhes.`);
      reject();
    };
    document.head.appendChild(script);
  });
}

// ── Prompt de salvar offline ───────────────────────────────────
function _showOfflinePrompt() {
  const ov = document.createElement('div');
  ov.style.cssText = `
    position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.7);
    display:flex;align-items:center;justify-content:center;padding:24px;
    font-family:Arial Black,Arial,sans-serif;
  `;
  ov.innerHTML = `
    <div style="background:#0e0e1a;border:1px solid rgba(123,104,238,0.4);border-radius:22px;
                padding:28px 24px;max-width:360px;width:100%;text-align:center;
                box-shadow:0 0 40px rgba(123,104,238,0.2);">
      <div style="font-size:36px;margin-bottom:12px;">📦</div>
      <div style="font-size:18px;font-weight:900;color:#fff;margin-bottom:8px;">Salvar offline?</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.55);line-height:1.6;margin-bottom:24px;">
        Deseja salvar o jogo no seu dispositivo para não precisar de internet na próxima vez?<br>
        <span style="color:rgba(255,255,255,0.3);font-size:11px;">(não inclui assets de áudio — ~200KB)</span>
      </div>
      <div style="display:flex;gap:10px;">
        <button id="_offlineNo"  style="flex:1;padding:14px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);
                border-radius:14px;font-size:15px;font-weight:700;color:rgba(255,255,255,0.6);cursor:pointer;">
          Não
        </button>
        <button id="_offlineYes" style="flex:2;padding:14px;background:linear-gradient(135deg,#7B68EE,#5a4fcf);border:none;
                border-radius:14px;font-size:15px;font-weight:900;color:white;cursor:pointer;
                box-shadow:0 4px 18px rgba(123,104,238,0.4);">
          Sim, salvar
        </button>
      </div>
      <div id="_offlineStatus" style="margin-top:14px;font-size:12px;color:rgba(255,255,255,0.35);min-height:18px;"></div>
    </div>
  `;
  document.body.appendChild(ov);

  document.getElementById('_offlineNo').onclick = () => document.body.removeChild(ov);
  document.getElementById('_offlineYes').onclick = () => {
    const st = document.getElementById('_offlineStatus');
    st.textContent = 'Salvando...';
    const ok = _cacheSave(_fetchedCodes);
    if (ok) {
      st.style.color = '#7B68EE';
      st.textContent = '✓ Salvo! Na próxima visita carrega offline.';
      setTimeout(() => document.body.removeChild(ov), 1800);
    } else {
      st.style.color = '#ff6666';
      st.textContent = 'Falhou — armazenamento cheio ou bloqueado.';
    }
  };
}

async function _loadAll() {
  const fromCache = _cacheOk();
  if (fromCache) {
    _fileEl.textContent = 'carregando do cache...';
  }

  // Dispara todos os fetches ao mesmo tempo
  const promises = _MODULES.map(f => _fetchModule(f));

  for (let i = 0; i < _TOTAL; i++) {
    _fileEl.textContent  = _MODULES[i];
    _countEl.textContent = `${i} / ${_TOTAL}`;

    const mod = await promises[i];
    if (!mod) return;

    try { await _execModule(mod); }
    catch { return; }
  }

  _done();

  // Mostra prompt só se veio da rede E ainda não tem cache salvo
  if (!fromCache && Object.keys(_fetchedCodes).length === _TOTAL) {
    setTimeout(_showOfflinePrompt, 800);
  }
}

_loadAll();
</script>

<!-- ── Editor: file input oculto + div overlay ─────────────── -->
<input type="file" id="hidden-file-input" style="display:none">

<div id="editor" style="display:none;position:fixed;inset:0;z-index:100;font-family:Arial,sans-serif;overflow:hidden;">

  <!-- BG gradient -->
  <div style="position:absolute;inset:0;background:linear-gradient(160deg,#dff6fd 0%,#b2eaf5 60%,#80d8ee 100%);"></div>

  <!-- Scrollable content -->
  <div id="ed-scroll" style="position:relative;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;">
  <div style="max-width:480px;margin:0 auto;padding:0 16px 120px;">

    <!-- TOP BAR -->
    <div style="display:flex;justify-content:space-between;align-items:center;padding:18px 0 10px;">
      <button id="ed-back-btn" onclick="edBack()" style="background:none;border:none;cursor:pointer;padding:6px;">
        <svg width="32" height="32" viewBox="0 0 32 32"><path d="M20 6 L10 16 L20 26" stroke="#0D2461" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
      </button>
      <div id="ed-step-dots" style="display:flex;gap:6px;align-items:center;"></div>
      <button onclick="closeEditor()" style="background:none;border:none;cursor:pointer;padding:6px;">
        <svg width="28" height="28" viewBox="0 0 28 28"><line x1="6" y1="6" x2="22" y2="22" stroke="#0D2461" stroke-width="3" stroke-linecap="round"/><line x1="22" y1="6" x2="6" y2="22" stroke="#0D2461" stroke-width="3" stroke-linecap="round"/></svg>
      </button>
    </div>

    <!-- HEADER CARD -->
    <div style="background:rgba(180,170,255,0.45);border-radius:22px;padding:20px 22px;margin-bottom:22px;backdrop-filter:blur(4px);">
      <div id="ed-header-title" style="font-size:28px;font-weight:900;color:#0D2461;line-height:1.15;"></div>
      <div id="ed-header-sub"   style="font-size:13px;color:#2c4a9e;margin-top:4px;"></div>
    </div>

    <!-- STEP CONTENT -->
    <div id="ed-step-content"></div>

  </div>
  </div><!-- /scroll -->

  <!-- BOTTOM BUTTONS (fixed) -->
  <div style="position:fixed;bottom:0;left:0;right:0;padding:12px 20px 24px;background:linear-gradient(0deg,#80d8ee 0%,transparent 100%);pointer-events:none;">
    <div style="max-width:480px;margin:0 auto;pointer-events:all;">
      <button id="ed-skip-btn" onclick="edSkip()" style="display:none;width:100%;padding:14px;margin-bottom:8px;background:rgba(255,255,255,0.55);border:2px solid rgba(0,100,150,0.2);border-radius:16px;font-size:15px;font-weight:700;color:#1a6b8a;cursor:pointer;backdrop-filter:blur(4px);">Pular</button>
      <button id="ed-next-btn" onclick="edNext()" style="width:100%;padding:16px;background:#00c5d4;border:none;border-radius:18px;font-size:18px;font-weight:900;color:white;cursor:pointer;box-shadow:0 4px 18px rgba(0,150,170,0.4);">Começar</button>
    </div>
  </div>

</div><!-- /editor -->

</body>
</html>
