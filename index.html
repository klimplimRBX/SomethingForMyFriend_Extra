<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Box vs Box</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #c { display: none; width: 100%; height: 100%; }

    /* ── LOADER ─────────────────────────────────────────────── */
    #loader {
      position: fixed; inset: 0; z-index: 999;
      background: #0a0a0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: Arial Black, Arial, sans-serif;
      transition: opacity 0.5s ease;
    }
    #loader.fade-out { opacity: 0; pointer-events: none; }
    #loader-title { font-size: clamp(28px,8vw,52px); font-weight:900; color:#fff; letter-spacing:-1px; margin-bottom:6px; text-shadow:0 0 40px rgba(130,80,255,0.8); }
    #loader-sub   { font-size: clamp(11px,3vw,14px); color:#7B68EE; font-weight:700; margin-bottom:48px; letter-spacing:2px; text-transform:uppercase; }
    #loader-bar-wrap { width:min(320px,80vw); background:rgba(255,255,255,0.07); border-radius:99px; height:8px; overflow:hidden; margin-bottom:16px; }
    #loader-bar   { height:100%; width:0%; background:linear-gradient(90deg,#7B68EE,#C39BD3); border-radius:99px; transition:width 0.25s ease; box-shadow:0 0 12px rgba(130,80,255,0.6); }
    #loader-file  { font-size:clamp(10px,2.5vw,12px); color:rgba(255,255,255,0.35); font-family:monospace; margin-bottom:4px; height:16px; }
    #loader-count { font-size:clamp(10px,2.5vw,11px); color:rgba(255,255,255,0.2); font-family:monospace; }

    /* ── ERRO ────────────────────────────────────────────────── */
    #error-overlay { display:none; position:fixed; inset:0; z-index:1000; background:#0a0a0f; align-items:center; justify-content:center; flex-direction:column; font-family:Arial,sans-serif; padding:24px; }
    #error-overlay.show { display:flex; }
    #error-icon  { font-size:48px; margin-bottom:16px; }
    #error-title { font-size:20px; font-weight:900; color:#ff4444; margin-bottom:8px; font-family:Arial Black,Arial,sans-serif; }
    #error-file  { font-size:13px; color:rgba(255,255,255,0.5); font-family:monospace; margin-bottom:20px; word-break:break-all; text-align:center; }
    #error-box   { background:rgba(255,40,40,0.08); border:1px solid rgba(255,40,40,0.25); border-radius:12px; padding:16px 20px; max-width:520px; width:100%; font-family:monospace; font-size:12px; color:#ff8888; line-height:1.6; white-space:pre-wrap; word-break:break-all; max-height:200px; overflow-y:auto; }
    #error-hint  { margin-top:16px; font-size:12px; color:rgba(255,255,255,0.3); text-align:center; max-width:400px; line-height:1.5; }
    #error-retry { margin-top:20px; padding:12px 28px; background:#7B68EE; border:none; border-radius:12px; font-size:14px; font-weight:900; color:white; cursor:pointer; font-family:Arial Black,Arial,sans-serif; }

    /* ── Editor animations ──────────────────────────────────── */
    @keyframes _edSlideIn  { from{opacity:0;transform:translateX(28px)} to{opacity:1;transform:translateX(0)} }
    @keyframes _edSlideBack{ from{opacity:0;transform:translateX(-28px)} to{opacity:1;transform:translateX(0)} }
    @keyframes _edFadeIn   { from{opacity:0;transform:scale(0.97)} to{opacity:1;transform:scale(1)} }
    #ed-step-content.anim-forward { animation:_edSlideIn   0.25s cubic-bezier(0.22,1,0.36,1); }
    #ed-step-content.anim-back    { animation:_edSlideBack 0.25s cubic-bezier(0.22,1,0.36,1); }
    #ed-step-content.anim-home    { animation:_edFadeIn    0.28s cubic-bezier(0.22,1,0.36,1); }
    #ed-header-title, #ed-header-sub { transition:opacity 0.18s ease; }

    /* ════════════════════════════════════════════════════════════
       MENU SCREEN
    ════════════════════════════════════════════════════════════ */
    @keyframes menuFadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes titleDrop   { from{opacity:0;transform:translateY(-24px)} to{opacity:1;transform:translateY(0)} }
    @keyframes cardRise    { from{opacity:0;transform:translateY(18px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes fightPop    { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
    @keyframes vsPulse     { 0%,100%{box-shadow:0 0 18px rgba(255,200,0,0.5),0 0 46px rgba(255,140,0,0.22)} 50%{box-shadow:0 0 30px rgba(255,200,0,0.75),0 0 72px rgba(255,140,0,0.38)} }
    @keyframes shimmer     { 0%{transform:translateX(-130%)} 28%,100%{transform:translateX(130%)} }
    @keyframes creditColor { 0%{color:hsl(128,82%,64%)} 33%{color:hsl(172,80%,60%)} 66%{color:hsl(150,78%,65%)} 100%{color:hsl(128,82%,64%)} }
    @keyframes arrowFloat  { 0%,100%{opacity:.5} 50%{opacity:.9} }
    @keyframes orb1move    { 0%,100%{transform:translate(0,0) scale(1)} 55%{transform:translate(-5%,-6%) scale(1.07)} }
    @keyframes orb2move    { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(6%,5%) scale(1.05)} }

    #menu-screen {
      display: none;
      position: fixed; inset: 0; z-index: 50;
      flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden;
      background: #03030e;
      animation: menuFadeIn 0.38s ease;
    }
    /* dot grid */
    #menu-screen::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(80,50,200,0.042) 1px,transparent 1px),
        linear-gradient(90deg,rgba(80,50,200,0.042) 1px,transparent 1px);
      background-size:44px 44px;
    }
    .m-orb {
      position:absolute; border-radius:50%; pointer-events:none; filter:blur(72px);
    }
    .m-orb-1 { width:55vw; height:55vw; max-width:400px; max-height:400px; top:-10%; left:-14%;
      background:radial-gradient(circle,rgba(70,15,190,0.52) 0%,transparent 68%);
      animation:orb1move 13s ease-in-out infinite; }
    .m-orb-2 { width:50vw; height:50vw; max-width:360px; max-height:360px; bottom:-8%; right:-12%;
      background:radial-gradient(circle,rgba(0,55,150,0.44) 0%,transparent 68%);
      animation:orb2move 16s ease-in-out infinite; }

    #menu-content {
      position:relative; z-index:1;
      display:flex; flex-direction:column; align-items:center;
      width:100%; max-width:520px; padding:0 10px;
    }
    #menu-title {
      font-family:'Bebas Neue','Arial Black',sans-serif;
      font-size:clamp(54px,15vw,92px); color:#fff; line-height:0.86;
      text-shadow:0 0 28px rgba(130,80,255,0.52),0 0 72px rgba(100,50,230,0.22);
      animation:titleDrop 0.48s cubic-bezier(0.22,1,0.36,1) both;
      letter-spacing:2px;
    }
    #menu-subtitle {
      font-family:'Rajdhani',Arial,sans-serif; font-weight:600;
      font-size:clamp(10px,3vw,14px); color:rgba(168,135,255,0.72);
      letter-spacing:6px; text-transform:uppercase; margin-bottom:20px;
      animation:titleDrop 0.52s 0.07s cubic-bezier(0.22,1,0.36,1) both;
    }
    #char-row {
      display:flex; align-items:center; justify-content:center;
      gap:clamp(8px,3.2vw,20px); width:100%; margin-bottom:12px;
    }

    /* ── char card ── */
    .char-card {
      flex:1; max-width:188px; min-width:0;
      background:rgba(255,255,255,0.028);
      border:1.5px solid rgba(255,255,255,0.09);
      border-radius:20px; padding:12px 10px 14px;
      display:flex; flex-direction:column; align-items:center; gap:8px;
      position:relative;
      transition:border-color 0.38s ease, box-shadow 0.38s ease;
      backdrop-filter:blur(12px);
      animation:cardRise 0.48s 0.14s cubic-bezier(0.22,1,0.36,1) both;
    }
    .char-card:nth-child(3) { animation-delay:0.21s; }

    .player-badge {
      font-family:'Rajdhani',Arial,sans-serif; font-weight:700;
      font-size:10px; letter-spacing:4px; color:rgba(255,255,255,0.35);
      text-transform:uppercase;
    }
    .char-portrait {
      width:min(108px,27vw); height:min(108px,27vw);
      border-radius:13px; overflow:hidden; background:rgba(0,0,0,0.32);
    }
    .char-portrait canvas { width:100%; height:100%; display:block; }

    .char-name {
      font-family:'Bebas Neue','Arial Black',sans-serif;
      font-size:clamp(12px,3.6vw,16px); color:#fff; text-align:center;
      line-height:1.1; padding:0 4px;
      min-height:34px; display:flex; align-items:center; justify-content:center;
    }

    /* arrow buttons overlay */
    .char-arrow-wrap {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:space-between;
      pointer-events:none;
    }
    .char-arrow {
      width:24px; height:54px; border:none; border-radius:10px;
      background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.65);
      font-size:20px; cursor:pointer;
      pointer-events:all;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.16s; font-family:Arial,sans-serif;
      animation:arrowFloat 2.8s ease-in-out infinite;
    }
    .char-arrow:hover  { background:rgba(255,255,255,0.17); color:#fff; }
    .char-arrow:active { background:rgba(255,255,255,0.27); }

    /* edit/delete buttons */
    .card-actions { position:absolute; top:6px; right:6px; display:flex; gap:4px; }
    .ca-btn {
      width:22px; height:22px; border:none; border-radius:6px;
      font-size:12px; cursor:pointer; align-items:center; justify-content:center;
      display:none; transition:filter 0.15s;
    }
    .ca-btn.edit { background:rgba(36,113,163,0.85); }
    .ca-btn.del  { background:rgba(192,57,43,0.85); }
    .ca-btn:hover { filter:brightness(1.25); }

    /* VS badge */
    #vs-badge {
      width:clamp(40px,10.5vw,54px); height:clamp(40px,10.5vw,54px);
      border-radius:50%; flex-shrink:0;
      background:linear-gradient(135deg,#FFD700,#FF9200);
      display:flex; align-items:center; justify-content:center;
      font-family:'Bebas Neue','Arial Black',sans-serif;
      font-size:clamp(15px,4.2vw,20px); color:#000;
      animation:vsPulse 2.4s ease-in-out infinite, cardRise 0.48s 0.18s cubic-bezier(0.22,1,0.36,1) both;
    }

    #menu-warning {
      font-family:'Rajdhani',Arial,sans-serif; font-weight:600;
      font-size:clamp(11px,2.8vw,13px); color:#ff6b6b;
      letter-spacing:0.5px; min-height:18px; text-align:center; margin-bottom:4px;
    }

    /* FIGHT button */
    #fight-btn {
      width:min(255px,78vw); padding:15px 0;
      background:linear-gradient(130deg,#FFD700 0%,#FF8800 100%);
      border:none; border-radius:16px;
      font-family:'Bebas Neue','Arial Black',sans-serif;
      font-size:clamp(25px,6.8vw,33px); letter-spacing:4px; color:#000;
      cursor:pointer; position:relative; overflow:hidden;
      box-shadow:0 4px 26px rgba(255,175,0,0.4),0 0 64px rgba(255,130,0,0.11);
      transition:transform 0.14s, box-shadow 0.14s;
      animation:fightPop 0.44s 0.30s cubic-bezier(0.22,1,0.36,1) both;
    }
    #fight-btn::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.27),transparent);
      transform:translateX(-130%); animation:shimmer 3.8s 1.2s ease-in-out infinite;
    }
    #fight-btn:hover:not(:disabled) { transform:translateY(-3px); box-shadow:0 10px 34px rgba(255,175,0,0.54),0 0 88px rgba(255,130,0,0.17); }
    #fight-btn:active:not(:disabled){ transform:translateY(1px); }
    #fight-btn:disabled { background:linear-gradient(130deg,#3a3a3a,#242424); color:#555; box-shadow:none; cursor:not-allowed; }
    #fight-btn:disabled::after { display:none; }

    #customize-btn {
      display:none; margin-top:10px; padding:11px 26px;
      background:rgba(130,55,180,0.2); border:1.5px solid rgba(155,89,182,0.42);
      border-radius:12px;
      font-family:'Rajdhani',Arial,sans-serif; font-weight:700;
      font-size:clamp(13px,3.6vw,15px); letter-spacing:1px; color:#CC8EF5;
      cursor:pointer; transition:background 0.2s, border-color 0.2s;
    }
    #customize-btn:hover { background:rgba(130,55,180,0.38); border-color:rgba(155,89,182,0.72); }

    #menu-credits {
      position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
      font-family:'Bebas Neue','Arial Black',sans-serif;
      font-size:clamp(16px,4.2vw,21px); letter-spacing:2px; white-space:nowrap;
      animation:creditColor 3.2s ease-in-out infinite;
    }

    /* ════════════════════════════════════════════════════════════
       GAMEOVER SCREEN
    ════════════════════════════════════════════════════════════ */
    @keyframes goIn       { from{opacity:0;transform:scale(0.68) translateY(32px)} to{opacity:1;transform:scale(1) translateY(0)} }
    @keyframes trophyBob  { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-9px) rotate(4deg)} }
    @keyframes winnerGlow { 0%,100%{text-shadow:0 0 18px rgba(255,205,0,0.48)} 50%{text-shadow:0 0 38px rgba(255,205,0,0.82),0 0 78px rgba(255,130,0,0.4)} }
    @keyframes confettiFall { 0%{transform:translateY(-10px) rotate(0);opacity:1} 100%{transform:translateY(90px) rotate(400deg);opacity:0} }

    #gameover-screen {
      display:none; position:fixed; inset:0; z-index:60;
      background:rgba(2,2,16,0.85); backdrop-filter:blur(6px);
      align-items:center; justify-content:center;
    }
    #gameover-screen.show { display:flex; }

    #go-confetti { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
    .gc { position:absolute; border-radius:2px; animation:confettiFall linear both; }

    #go-card {
      position:relative; z-index:1;
      background:rgba(7,5,18,0.97);
      border:2px solid rgba(255,205,0,0.32);
      border-radius:26px;
      padding:clamp(30px,5.5vw,52px) clamp(26px,7.5vw,60px);
      text-align:center;
      box-shadow:0 0 55px rgba(255,175,0,0.11),0 28px 76px rgba(0,0,0,0.72);
      animation:goIn 0.44s cubic-bezier(0.22,1,0.36,1);
      max-width:min(470px,90vw); width:100%;
    }
    #go-trophy  { font-size:clamp(46px,11vw,66px); display:block; margin-bottom:10px; animation:trophyBob 2s ease-in-out infinite; }
    #go-label   { font-family:'Rajdhani',Arial,sans-serif; font-weight:600; font-size:clamp(10px,2.6vw,12px); letter-spacing:5px; color:rgba(255,205,0,0.52); margin-bottom:6px; text-transform:uppercase; }
    #go-winner  { font-family:'Bebas Neue','Arial Black',sans-serif; font-size:clamp(32px,8.5vw,56px); color:#FFD700; line-height:1.05; margin-bottom:34px; animation:winnerGlow 2.2s ease-in-out infinite; }
    #go-play-btn {
      padding:14px clamp(28px,7vw,52px);
      background:linear-gradient(130deg,#2471A3,#1a5c85);
      border:none; border-radius:15px;
      font-family:'Bebas Neue','Arial Black',sans-serif;
      font-size:clamp(18px,4.8vw,24px); letter-spacing:3px; color:white;
      cursor:pointer; box-shadow:0 4px 22px rgba(36,113,163,0.42);
      transition:transform 0.14s, box-shadow 0.14s;
    }
    #go-play-btn:hover  { transform:translateY(-2px); box-shadow:0 8px 30px rgba(36,113,163,0.56); }
    #go-play-btn:active { transform:translateY(1px); }
  </style>
</head>
<body>

<!-- ── Loading ──────────────────────────────────────────────── -->
<div id="loader">
  <div id="loader-title">Box vs Box</div>
  <div id="loader-sub">Guy Battle</div>
  <div id="loader-bar-wrap"><div id="loader-bar"></div></div>
  <div id="loader-file">iniciando...</div>
  <div id="loader-count"></div>
</div>

<!-- ── Erro ─────────────────────────────────────────────────── -->
<div id="error-overlay">
  <div id="error-icon">💀</div>
  <div id="error-title">Erro ao carregar</div>
  <div id="error-file"></div>
  <div id="error-box"></div>
  <div id="error-hint"></div>
  <button id="error-retry" onclick="location.reload()">Tentar novamente</button>
</div>

<!-- ── Canvas ───────────────────────────────────────────────── -->
<canvas id="c"></canvas>

<!-- ════════════════════════════════════════════════════════════
     MENU SCREEN
════════════════════════════════════════════════════════════════ -->
<div id="menu-screen">
  <div class="m-orb m-orb-1"></div>
  <div class="m-orb m-orb-2"></div>

  <div id="menu-content">
    <div id="menu-title">BOX VS BOX</div>
    <div id="menu-subtitle">Guy Battle</div>

    <div id="char-row">
      <!-- P1 -->
      <div class="char-card" id="p1-card">
        <div class="card-actions">
          <button class="ca-btn edit" id="p1-edit">✏️</button>
          <button class="ca-btn del"  id="p1-del">🗑</button>
        </div>
        <span class="player-badge">P1</span>
        <div class="char-portrait"><canvas id="p1-canvas" width="120" height="120"></canvas></div>
        <div class="char-name" id="p1-name">—</div>
        <div class="char-arrow-wrap">
          <button class="char-arrow" id="p1-prev">‹</button>
          <button class="char-arrow" id="p1-next">›</button>
        </div>
      </div>

      <div id="vs-badge">VS</div>

      <!-- P2 -->
      <div class="char-card" id="p2-card">
        <div class="card-actions">
          <button class="ca-btn edit" id="p2-edit">✏️</button>
          <button class="ca-btn del"  id="p2-del">🗑</button>
        </div>
        <span class="player-badge">P2</span>
        <div class="char-portrait"><canvas id="p2-canvas" width="120" height="120"></canvas></div>
        <div class="char-name" id="p2-name">—</div>
        <div class="char-arrow-wrap">
          <button class="char-arrow" id="p2-prev">‹</button>
          <button class="char-arrow" id="p2-next">›</button>
        </div>
      </div>
    </div>

    <div id="menu-warning"></div>
    <button id="fight-btn">⚔ LUTAR</button>
    <button id="customize-btn">⚙ CUSTOMIZAR PERSONAGEM</button>
  </div>

  <div id="menu-credits">@VggxYT</div>
</div>

<!-- ════════════════════════════════════════════════════════════
     GAMEOVER SCREEN
════════════════════════════════════════════════════════════════ -->
<div id="gameover-screen">
  <div id="go-confetti"></div>
  <div id="go-card">
    <span id="go-trophy">🏆</span>
    <div id="go-label">VENCEDOR</div>
    <div id="go-winner">—</div>
    <button id="go-play-btn">↩ JOGAR NOVAMENTE</button>
  </div>
</div>

<!-- ── Loader script ─────────────────────────────────────────── -->
<script>
"use strict";
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const DPR    = window.devicePixelRatio || 1;

const _BASE = 'https://raw.githubusercontent.com/klimplimRBX/SomethingForMyFriend_Extra/main/';
const _MODULES = [
  'audio.js','assets.js','constants.js','utils.js','projectiles.js',
  'char_base.js','char_tiger.js','char_moto.js','char_neymar.js','char_baiano.js',
  'char_receita.js','char_jevil.js','char_dog.js','char_custom.js','char_player.js',
  'persistence.js','hydration.js','char_types.js','game.js','input.js','editor.js'
];
const _TOTAL = _MODULES.length;
let _loaded  = 0;

const _loaderEl = document.getElementById('loader');
const _barEl    = document.getElementById('loader-bar');
const _fileEl   = document.getElementById('loader-file');
const _countEl  = document.getElementById('loader-count');
const _errOver  = document.getElementById('error-overlay');
const _errFile  = document.getElementById('error-file');
const _errBox   = document.getElementById('error-box');
const _errHint  = document.getElementById('error-hint');

window.addEventListener('error', e => {
  const src = e.filename || '';
  if (!_MODULES.some(m => src.includes(m)) && src && !src.includes('SomethingForMyFriend_Extra')) return;
  _showError(src||'execução',`${e.message}\n\nArquivo: ${src}\nLinha: ${e.lineno}  Coluna: ${e.colno}`,
    'Erro de execução — provavelmente um bug no módulo ou dependência não carregada.');
});

function _updateProgress(filename) {
  _loaded++;
  _barEl.style.width = ((_loaded/_TOTAL)*100) + '%';
  _fileEl.textContent = filename;
  _countEl.textContent = `${_loaded} / ${_TOTAL}`;
}
function _showError(url, msg, hint) {
  _loaderEl.style.display = 'none';
  _errFile.textContent = url; _errBox.textContent = msg; _errHint.textContent = hint||'';
  _errOver.classList.add('show');
}

function _done() {
  _fileEl.textContent  = 'pronto!';
  _countEl.textContent = `${_TOTAL} / ${_TOTAL}`;
  _barEl.style.width   = '100%';
  canvas.style.display = 'block';

  // Patch closeEditor to re-show menu when editor is closed
  if (typeof closeEditor === 'function') {
    const _origCE = closeEditor;
    window.closeEditor = function() {
      _origCE();
      if (window._menuUI) { window._menuUI.update(); window._menuUI.show(); }
    };
  }

  setTimeout(() => {
    _loaderEl.classList.add('fade-out');
    setTimeout(() => {
      _loaderEl.style.display = 'none';
      if (window._menuUI) window._menuUI.show();
    }, 520);
  }, 300);
}

// ── Cache ─────────────────────────────────────────────────────
const _CK = 'gbcache_';
function _cacheOk()    { try { return localStorage.getItem(_CK+'ok')==='1'; } catch { return false; } }
function _cacheLoad(f) { try { return localStorage.getItem(_CK+f); }         catch { return null; } }
function _cacheSave(codes) {
  try { for(const[f,c] of Object.entries(codes)) localStorage.setItem(_CK+f,c); localStorage.setItem(_CK+'ok','1'); return true; }
  catch(e){ try{for(const f of _MODULES)localStorage.removeItem(_CK+f);localStorage.removeItem(_CK+'ok');}catch{} return false; }
}
function _cacheClear() { try{for(const f of _MODULES)localStorage.removeItem(_CK+f);localStorage.removeItem(_CK+'ok');}catch{} }

const _fetchedCodes = {};
async function _fetchModule(filename) {
  const url = _BASE + filename;
  if (_cacheOk()) { const cached=_cacheLoad(filename); if(cached) return {filename,url,blob:new Blob([cached],{type:'application/javascript'}),fromCache:true}; }
  let res;
  try { res = await fetch(url); }
  catch(e) { _showError(url,`Erro de rede: ${e.message}\n\nVerifique sua conexão.`); return null; }
  if (!res.ok) {
    let d=`HTTP ${res.status} ${res.statusText}\nURL: ${url}\n`;
    if(res.status===404)d+='\nArquivo não encontrado.';
    else if(res.status===403)d+='\nAcesso negado.';
    else if(res.status===429)d+='\nMuitas requisições — aguarde.';
    _showError(url,d); return null;
  }
  const code = await res.text(); _fetchedCodes[filename] = code;
  return {filename,url,blob:new Blob([code],{type:'application/javascript'}),fromCache:false};
}
function _execModule({filename,url,blob}) {
  return new Promise((resolve,reject)=>{
    const blobURL=URL.createObjectURL(blob), script=document.createElement('script');
    script.src=blobURL;
    script.onload=()=>{ URL.revokeObjectURL(blobURL); _updateProgress(filename); resolve(); };
    script.onerror=()=>{ URL.revokeObjectURL(blobURL); _showError(url,`Erro ao executar "${filename}".`); reject(); };
    document.head.appendChild(script);
  });
}
function _showOfflinePrompt() {
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:24px;font-family:Arial Black,Arial,sans-serif;';
  ov.innerHTML=`<div style="background:#0e0e1a;border:1px solid rgba(123,104,238,0.4);border-radius:22px;padding:28px 24px;max-width:360px;width:100%;text-align:center;box-shadow:0 0 40px rgba(123,104,238,0.2);">
    <div style="font-size:36px;margin-bottom:12px;">📦</div>
    <div style="font-size:18px;font-weight:900;color:#fff;margin-bottom:8px;">Salvar offline?</div>
    <div style="font-size:13px;color:rgba(255,255,255,0.55);line-height:1.6;margin-bottom:24px;">
      Salve o jogo no dispositivo para jogar sem internet.<br><span style="color:rgba(255,255,255,0.3);font-size:11px;">(não inclui áudio — ~200KB)</span></div>
    <div style="display:flex;gap:10px;">
      <button id="_oNo" style="flex:1;padding:14px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:14px;font-size:15px;font-weight:700;color:rgba(255,255,255,0.6);cursor:pointer;">Não</button>
      <button id="_oYes" style="flex:2;padding:14px;background:linear-gradient(135deg,#7B68EE,#5a4fcf);border:none;border-radius:14px;font-size:15px;font-weight:900;color:white;cursor:pointer;">Sim, salvar</button>
    </div>
    <div id="_oSt" style="margin-top:14px;font-size:12px;color:rgba(255,255,255,0.35);min-height:18px;"></div>
  </div>`;
  document.body.appendChild(ov);
  document.getElementById('_oNo').onclick=()=>document.body.removeChild(ov);
  document.getElementById('_oYes').onclick=()=>{
    const st=document.getElementById('_oSt'); st.textContent='Salvando...';
    if(_cacheSave(_fetchedCodes)){st.style.color='#7B68EE';st.textContent='✓ Salvo!';setTimeout(()=>document.body.removeChild(ov),1800);}
    else{st.style.color='#ff6666';st.textContent='Falhou — armazenamento cheio.';}
  };
}

async function _loadAll() {
  if(_cacheOk()) _fileEl.textContent='carregando do cache...';
  const promises = _MODULES.map(f=>_fetchModule(f));
  for(let i=0;i<_TOTAL;i++){
    _fileEl.textContent=_MODULES[i]; _countEl.textContent=`${i} / ${_TOTAL}`;
    const mod=await promises[i]; if(!mod)return;
    try{ await _execModule(mod); } catch{ return; }
  }
  _done();
  if(!_cacheOk() && Object.keys(_fetchedCodes).length===_TOTAL) setTimeout(_showOfflinePrompt,800);
}
_loadAll();
</script>

<!-- ── Menu UI + Gameover logic ─────────────────────────────── -->
<script>
"use strict";

/* Portrait drawer — draws char image onto a canvas element */
function _updatePortrait(cvs, typeIdx) {
  if (typeof CHAR_TYPES === 'undefined' || !cvs) return;
  const type = CHAR_TYPES[typeIdx];
  if (!type) return;
  const c = cvs.getContext('2d'), sz = cvs.width;
  c.clearRect(0, 0, sz, sz);
  const ok = img => img && img.complete && img.naturalWidth > 0;

  if      (type.cls===TigerCharacter          && ok(TIGER_IMGS&&TIGER_IMGS.Tiger))         { c.drawImage(TIGER_IMGS.Tiger, 0,0,sz,sz); }
  else if (type.cls===MotoCharacter           && ok(MOTO_IMG))                              { c.drawImage(MOTO_IMG, 0,0,sz,sz); }
  else if (type.cls===NeymarCharacter         && ok(NEYMAR_IMGS&&NEYMAR_IMGS.Neymar))      { c.drawImage(NEYMAR_IMGS.Neymar, 0,0,sz,sz); }
  else if (type.cls===BaianoCharacter         && ok(BAIANO_IMG))                            { const bw=sz*0.88,bh=sz*0.54; c.drawImage(BAIANO_IMG,(sz-bw)/2,(sz-bh)/2,bw,bh); }
  else if (type.cls===ReceitaFederalCharacter && ok(RF_IMGS&&RF_IMGS.ReceitaFederal))       { c.drawImage(RF_IMGS.ReceitaFederal, 0,0,sz,sz); }
  else if (type.cls===DogCharacter            && ok(DOG_IMGS&&DOG_IMGS.MainDog))            { c.drawImage(DOG_IMGS.MainDog, 0,0,sz,sz); }
  else if (type.cls===FinaleCharacter) {
    c.fillStyle='#0a0020'; c.fillRect(0,0,sz,sz);
    const r=sz*0.42; c.save(); c.shadowColor='#9B59B6'; c.shadowBlur=sz*0.14;
    c.beginPath(); c.moveTo(sz/2,sz/2-r); c.lineTo(sz/2+r,sz/2); c.lineTo(sz/2,sz/2+r); c.lineTo(sz/2-r,sz/2); c.closePath();
    c.fillStyle='#1a0030'; c.fill(); c.strokeStyle='#C39BD3'; c.lineWidth=2; c.stroke(); c.shadowBlur=0;
    c.font=`bold ${Math.round(sz*0.34)}px Arial Black,sans-serif`; c.textAlign='center'; c.textBaseline='middle';
    c.fillStyle='#E8D5F5'; c.fillText('⚙',sz/2,sz/2+sz*0.02); c.restore();
  } else if ((type.isCustom||type.isPlayerCustom) && type.cfg && ok(type.cfg._charImgEl)) {
    c.drawImage(type.cfg._charImgEl, 0,0,sz,sz);
  } else if (type.isCustomSlot) {
    c.fillStyle='rgba(85,35,125,0.35)'; c.fillRect(0,0,sz,sz);
    c.strokeStyle='rgba(155,89,182,0.62)'; c.lineWidth=3;
    const p=sz*0.27; c.beginPath(); c.moveTo(sz/2,p); c.lineTo(sz/2,sz-p); c.moveTo(p,sz/2); c.lineTo(sz-p,sz/2); c.stroke();
  } else {
    c.fillStyle=type.color||'#888'; c.fillRect(0,0,sz,sz);
    c.strokeStyle='rgba(255,255,255,0.2)'; c.lineWidth=4; c.strokeRect(4,4,sz-8,sz-8);
    c.fillStyle='rgba(255,255,255,0.1)'; c.fillRect(sz*0.28,sz*0.28,sz*0.44,sz*0.44);
  }
}

function _cardAccent(typeIdx) {
  if (typeof CHAR_TYPES === 'undefined') return '#ffffff';
  const t = CHAR_TYPES[typeIdx];
  if (!t) return '#ffffff';
  if (t.cls===TigerCharacter)          return '#FF8C00';
  if (t.cls===NeymarCharacter)         return '#FFD700';
  if (t.cls===BaianoCharacter)         return '#3A7BD5';
  if (t.cls===ReceitaFederalCharacter) return '#2471A3';
  if (t.cls===FinaleCharacter)         return '#C39BD3';
  if (t.cls===DogCharacter)            return '#C68642';
  if (t.cls===MotoCharacter)           return '#aaaaaa';
  if (t.isCustomSlot||t.isCustom||t.isPlayerCustom) return '#9B59B6';
  return t.color||'#ffffff';
}

function _h2r(hex, a) {
  const h=hex.replace('#','').padEnd(6,'0');
  const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

/* ── Menu UI controller ────────────────────────────────────── */
window._menuUI = {
  active: false,
  _ready: false,

  _wire() {
    if (this._ready) return; this._ready = true;

    const isP = idx => !!(CHAR_TYPES[idx] && (CHAR_TYPES[idx].isPlayer || CHAR_TYPES[idx].isPlayerCustom));
    const cycle = (pl, d) => {
      const n=CHAR_TYPES.length; let t=0;
      do { sel[pl]=(sel[pl]+d+n)%n; t++; } while(t<n && isP(sel.p1) && isP(sel.p2));
      this.update();
    };

    document.getElementById('p1-prev').onclick = () => cycle('p1',-1);
    document.getElementById('p1-next').onclick = () => cycle('p1', 1);
    document.getElementById('p2-prev').onclick = () => cycle('p2',-1);
    document.getElementById('p2-next').onclick = () => cycle('p2', 1);

    document.getElementById('fight-btn').onclick = () => {
      const t1=CHAR_TYPES[sel.p1], t2=CHAR_TYPES[sel.p2];
      if (t1.isCustomSlot||t2.isCustomSlot) return;
      if ((t1.isPlayer||t1.isPlayerCustom)&&(t2.isPlayer||t2.isPlayerCustom)) return;
      this.hide(); G.start();
    };

    document.getElementById('customize-btn').onclick = () => { this.hide(); openEditor(); };

    document.getElementById('p1-edit').onclick = () => this._edit('p1');
    document.getElementById('p1-del' ).onclick = () => this._del('p1');
    document.getElementById('p2-edit').onclick = () => this._edit('p2');
    document.getElementById('p2-del' ).onclick = () => this._del('p2');

    document.getElementById('go-play-btn').onclick = () => {
      document.getElementById('gameover-screen').classList.remove('show');
      G._goShown = false;
      SFX.stopLoop('snoring'); SFX.stopMusic();
      G._finaleActive = false; G.state = 'menu'; _applyCursor();
      this.update(); this.show();
    };
  },

  show() {
    this._wire(); this.update();
    document.getElementById('menu-screen').style.display = 'flex';
    this.active = true;
  },
  hide() {
    document.getElementById('menu-screen').style.display = 'none';
    this.active = false;
  },

  update() {
    if (typeof CHAR_TYPES === 'undefined') return;
    this._updateCard('p1', sel.p1);
    this._updateCard('p2', sel.p2);
    this._updateBtns();
  },

  _updateCard(pl, idx) {
    const type = CHAR_TYPES[idx];
    document.getElementById(`${pl}-name`).textContent = type.name;
    _updatePortrait(document.getElementById(`${pl}-canvas`), idx);
    const accent = _cardAccent(idx);
    const card   = document.getElementById(`${pl}-card`);
    card.style.borderColor = _h2r(accent, 0.46);
    card.style.boxShadow   = `0 0 26px ${_h2r(accent,0.13)},inset 0 0 16px ${_h2r(accent,0.05)}`;
    const edit = document.getElementById(`${pl}-edit`);
    const del  = document.getElementById(`${pl}-del`);
    if (type.isCustom||type.isPlayerCustom) { edit.style.display='flex'; del.style.display='flex'; }
    else if (type.isPlayer)                  { edit.style.display='flex'; del.style.display='none'; }
    else                                     { edit.style.display='none'; del.style.display='none'; }
  },

  _updateBtns() {
    const t1=CHAR_TYPES[sel.p1], t2=CHAR_TYPES[sel.p2];
    const customSlot = t1.isCustomSlot||t2.isCustomSlot;
    const bothPlayer = (t1.isPlayer||t1.isPlayerCustom)&&(t2.isPlayer||t2.isPlayerCustom);
    document.getElementById('customize-btn').style.display = customSlot ? 'block' : 'none';
    const fb = document.getElementById('fight-btn');
    const wb = document.getElementById('menu-warning');
    if (bothPlayer) { fb.disabled=true; wb.textContent='⚠ Escolha um adversário diferente!'; }
    else if (customSlot) { fb.disabled=true; wb.textContent=''; }
    else { fb.disabled=false; wb.textContent=''; }
  },

  _edit(pl) {
    const idx=sel[pl], type=CHAR_TYPES[idx];
    this.hide();
    if (type.isPlayerCustom)      openEditorForPlayer(true);
    else if (type.isCustom)       { document.getElementById('editor').style.display='block'; edEditChar(idx-_baseCharCount); }
    else                          openEditorForPlayer(false);
  },

  async _del(pl) {
    const idx=sel[pl], type=CHAR_TYPES[idx];
    if (type.isPlayerCustom) {
      if (!confirm(`Deletar "${type.name}"?`)) return;
      deletePlayerCustom(); await initPlayerCustom(); await initCustomChars();
    } else {
      const saved=loadCustomChars(), ci=idx-_baseCharCount;
      if (ci<0||ci>=saved.length) return;
      if (!confirm(`Deletar "${saved[ci].name}"?`)) return;
      saved.splice(ci,1); saveCustomChars(saved); await initCustomChars();
    }
    const n=CHAR_TYPES.length;
    if(sel.p1>=n)sel.p1=n-1; if(sel.p2>=n)sel.p2=n-1;
    if(sel.p1===0&&sel.p2===0&&n>1)sel.p2=1;
    this.update();
  },

  showGameOver(text) {
    const isEmpate = text.includes('EMPATE');
    document.getElementById('go-trophy').textContent = isEmpate ? '🤝' : '🏆';
    document.getElementById('go-label').textContent  = isEmpate ? 'EMPATE' : 'VENCEDOR';
    document.getElementById('go-winner').textContent = text;
    if (!isEmpate) this._confetti();
    document.getElementById('gameover-screen').classList.add('show');
  },

  _confetti() {
    const wrap = document.getElementById('go-confetti');
    wrap.innerHTML = '';
    const colors = ['#FFD700','#FF8C00','#FF6B6B','#4ECDC4','#A8E6CF','#fff','#C39BD3','#85C1E9'];
    for (let i=0; i<30; i++) {
      const el = document.createElement('div');
      el.className = 'gc';
      const sz = 6+Math.random()*9, dur = 1.3+Math.random()*1.1, del = Math.random()*1.4;
      el.style.cssText=`left:${Math.random()*100}%;top:${8+Math.random()*42}%;width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};animation-duration:${dur}s;animation-delay:${del}s;border-radius:${Math.random()>.5?'50%':'2px'};`;
      wrap.appendChild(el);
    }
  },
};
</script>
